# dotctl - hyprland keybindings
# -----------------------------------------------------------------------------
# User-sourceable keybind snippet. Add this line to ~/.config/hypr/hyprland.conf
# (at the BOTTOM so it overrides any earlier defaults):
#
#     source = ~/.config/hypr/dotctl-keybinds.conf
#
# hyprctl reload afterwards. These binds are safe to comment out individually
# if they collide with your existing setup.
# -----------------------------------------------------------------------------

# --- Waybar & wallpaper cycling ----------------------------------------------
# NOTE: uses hardcoded SUPER (Mod4) instead of $mainMod so the snippet works
# regardless of where in hyprland.conf the `source =` directive is placed.
# If you use a different main modifier, edit the `SUPER ALT` tokens below.
#
# Cycle through the 4 canonical waybar variants (pill/console × full/minimal)
bind = SUPER ALT, Up,    exec, dotctl cycle waybar next
bind = SUPER ALT, Down,  exec, dotctl cycle waybar prev
# Cycle the wallpaper image within the current theme
bind = SUPER ALT, Right, exec, dotctl cycle wallpaper next
bind = SUPER ALT, Left,  exec, dotctl cycle wallpaper prev

# --- Audio output switching --------------------------------------------------
# One-touch route the default sink to a specific output class. audio-output
# resolves the sink at runtime via pactl port-type + description detection.
bind = ALT SHIFT, A, exec, audio-output aux       # analog / line-out
bind = ALT SHIFT, S, exec, audio-output speaker   # hdmi / monitor speakers
bind = ALT SHIFT, H, exec, audio-output headset   # wired or wireless headset
bind = ALT SHIFT, L, exec, audio-output bluetooth # any paired bluez sink
bind = ALT SHIFT, M, exec, audio-output toggle-mute
