# kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      Px437 PhoenixEGA 8x16
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

# General
enable_audio_bell    no
window_padding_width 4
cursor_trail         1

# Theme (forest - tans & drab greens palette)
background #141410
foreground #d9cba4

# black
color0 #141410
color8 #3d3a28
# red (oxblood / desert rust)
color1 #8b3a3a
color9 #b87333
# green
color2  #4b5320
color10 #8a9a3d
# yellow (khaki / light khaki)
color3  #a89152
color11 #c3b091
# blue (field drab / drab sage)
color4  #3e4a33
color12 #5b6d3e
# magenta (leather brown / coyote brown)
color5  #6b4f2a
color13 #8b6f3f
# cyan (pale sage)
color6  #9aa370
color14 #9aa370
# white (tan fg)
color7  #d9cba4
color15 #c3b091

cursor            #c3b091
cursor_text_color #141410

selection_foreground #d9cba4
selection_background #2a2820

url_color #b87333

active_border_color   #8a9a3d
inactive_border_color #3d3a28

active_tab_foreground   #d9cba4
active_tab_background   #3d3a28
inactive_tab_foreground #8d8469
inactive_tab_background #1c1c14

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Latency
input_delay        0
repaint_delay      2
sync_to_monitor    no
wayland_enable_ime no
