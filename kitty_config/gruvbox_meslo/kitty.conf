# kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      MesloLGS Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Symbol maps
# Powerline separators
symbol_map U+E0A0-U+E0A2 JetBrainsMono Nerd Font Mono
symbol_map U+E0B0-U+E0B3 JetBrainsMono Nerd Font Mono
# Devicons / codicons used by nvim-web-devicons & bufferline
symbol_map U+EA60-U+EBEB JetBrainsMono Nerd Font Mono
symbol_map U+E700-U+E7C5 JetBrainsMono Nerd Font Mono
# Last-resort PUA fallback
symbol_map U+E000-U+F8FF Symbols Nerd Font Mono

# General
enable_audio_bell    no
window_padding_width 4
cursor_trail         1

# Theme (gruvbox-dark)
foreground #ebdbb2
background #272727

cursor            #928374
cursor_text_color background

visual_bell_color #8ec07c
bell_border_color #8ec07c

active_border_color   #d3869b
inactive_border_color #665c54

active_tab_foreground   #fbf1c7
active_tab_background   #665c54
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

selection_foreground #655b53
selection_background #ebdbb2
url_color            #d65c0d

# black
color0 #272727
color8 #928373
# red
color1 #cc231c
color9 #fb4833
# green
color2  #989719
color10 #b8ba25
# yellow
color3  #d79920
color11 #fabc2e
# blue
color4  #448488
color12 #83a597
# magenta
color5  #b16185
color13 #d3859a
# cyan
color6  #689d69
color14 #8ec07b
# white
color7  #a89983
color15 #ebdbb2

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no
