# kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      Px437 PhoenixEGA 8x16
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

# General
enable_audio_bell    no
window_padding_width 4
cursor_trail         1

# Theme (coyote — desert tan / coyote brown palette)
background #1a1410
foreground #d4b483

# black
color0 #1a1410
color8 #4a3828
# red (sienna / rust)
color1 #a0412a
color9 #c9522a
# green (dark khaki / tan olive)
color2  #8a7339
color10 #b08c4d
# yellow (desert tan)
color3  #c19a6b
color11 #dcb88a
# blue (dark goldenrod — warm substitute)
color4  #8b6914
color12 #b8860b
# magenta (saddle brown / rust)
color5  #8b4513
color13 #b5651d
# cyan (pale tan)
color6  #c0a878
color14 #dcc3a0
# white (bisque / wheat)
color7  #e4c9a3
color15 #f5deb3

cursor            #f5deb3
cursor_text_color #1a1410

selection_foreground #e4c9a3
selection_background #3d2e1f

url_color #c9522a

active_border_color   #c19a6b
inactive_border_color #4a3828

active_tab_foreground   #f5deb3
active_tab_background   #4a3828
inactive_tab_foreground #8a7339
inactive_tab_background #241a12

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Latency
input_delay        0
repaint_delay      2
sync_to_monitor    no
wayland_enable_ime no
