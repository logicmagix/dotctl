# kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      Px437 PhoenixEGA 8x16
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

# Symbol maps
# Powerline separators
symbol_map U+E0A0-U+E0A2 JetBrainsMono Nerd Font Mono
symbol_map U+E0B0-U+E0B3 JetBrainsMono Nerd Font Mono
# Devicons / codicons used by nvim-web-devicons & bufferline
symbol_map U+EA60-U+EBEB JetBrainsMono Nerd Font Mono
symbol_map U+E700-U+E7C5 JetBrainsMono Nerd Font Mono
# Last-resort PUA fallback
symbol_map U+E000-U+F8FF Symbols Nerd Font Mono

# General
enable_audio_bell    no
window_padding_width 4
cursor_trail         1

# Theme (tokyo-night)
background #24283b
foreground #a9b1d6

color0 #414868
color8 #414868

color1 #f7768e
color9 #f7768e

color2  #73daca
color10 #73daca

color3  #e0af68
color11 #e0af68

color4  #7aa2f7
color12 #7aa2f7

color5  #bb9af7
color13 #bb9af7

color6  #7dcfff
color14 #7dcfff

color7  #c0caf5
color15 #c0caf5

cursor            #c0caf5
cursor_text_color #1a1b26

selection_foreground none
selection_background #28344a

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Latency
input_delay        0
repaint_delay      2
sync_to_monitor    no
wayland_enable_ime no
