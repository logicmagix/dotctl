# kitty terminal configuration
# https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      Px437 PhoenixEGA 8x16
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

# General
enable_audio_bell    no
window_padding_width 4
cursor_trail         1

# Theme (decay)
background #0d0f18
foreground #a5b6cf

color0 #151720
color8 #1c1e27

color1 #dd6777
color9 #e26c7c

color4  #90ceaa
color12 #95d3af

color3  #ecd3a0
color11 #f1d8a5

color2  #86aaec
color10 #8baff1

color5  #c296eb
color13 #c79bf0

color6  #93cee9
color14 #98d3ee

color7  #cbced3
color15 #d0d3d8

cursor            #cbced3
cursor_text_color #a5b6cf

selection_foreground #a5b6cf
selection_background #1c1e27

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Latency
input_delay        0
repaint_delay      2
sync_to_monitor    no
wayland_enable_ime no
